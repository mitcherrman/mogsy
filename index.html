      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" />

    </noscript>
    <script>
      // Load fonts asynchronously — media="print" trick prevents render-blocking
      (function() {
        var fonts = [
          'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap',
          'https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap',
          'https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap'
        ];
        fonts.forEach(function(href) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href;
          link.media = 'print';
          link.onload = function() { this.media = 'all'; };
          document.head.appendChild(link);
        });
      })();
    </script>

  <body style="background:#0a0a1a">
    <script>
      // Apply user accessibility/personalization classes before first paint
      (function() {
        try {
          var d = document.documentElement;
          if (localStorage.getItem('mogsy-reduce-motion') === '1') d.classList.add('reduce-motion');
          if (localStorage.getItem('mogsy-large-text') === '1') d.classList.add('large-text');
          if (localStorage.getItem('mogsy-high-contrast') === '1') d.classList.add('high-contrast');
        } catch (e) {}
      })();
    </script>
    <!-- Static shell painted immediately for fast FCP — lives OUTSIDE #root so React doesn't destroy it -->
    <div id="initial-shell" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a1a;position:fixed;inset:0;z-index:9999;transition:opacity .3s ease-out;">
