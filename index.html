    {
      "@context": "https://schema.org",

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.gpteng.co" crossorigin />

    <!-- Preload LCP image so browser discovers it immediately -->
    <link rel="preload" as="image" href="/mogsy-logo-text.png" fetchpriority="high" />

    <!-- Non-render-blocking font loading via JS injection -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" />
    </noscript>
    <script>
      // Load fonts asynchronously to avoid render-blocking
      (function() {
        var fonts = [
          'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap',
          'https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap',
          'https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap'
        ];
        fonts.forEach(function(href) {
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href;
          document.head.appendChild(link);
        });
      })();
    </script>

  <body>
    <div id="root"></div>

    <script>
      // Defer AdSense loading until after page is interactive
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.createElement('script');
          s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX';
          s.async = true;
          s.crossOrigin = 'anonymous';
          document.head.appendChild(s);
        }, 3000);
      });
    </script>
  </body>
